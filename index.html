<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Elleville minipremier</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:linear-gradient(135deg,#f7efe5,#e7d8c9,#cfd8d3);
  color:#2f2a26;
}
header{text-align:center;padding:28px 14px 14px}
h1{
  margin:0;
  font-size:clamp(34px,7vw,72px);
  line-height:1;
  color:#4b3f35;
}
.sub{margin-top:10px;font-size:18px;color:#6d5d50}
.controls{
  position:sticky;top:0;z-index:20;
  display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
  padding:14px;background:#f7efe5dd;backdrop-filter:blur(10px);
  border-top:1px solid #ffffff99;border-bottom:1px solid #bda99a66;
}
button{
  border:0;border-radius:999px;padding:14px 24px;
  font-size:18px;font-weight:850;cursor:pointer;
  color:#fffaf5;background:#8b6f5a;
  box-shadow:0 6px 0 #5f493b,0 10px 22px #6c584855;
}
button:hover{background:#7d604d}
button:active{transform:translateY(4px);box-shadow:0 2px 0 #5f493b,0 6px 14px #6c584855}
button:disabled{opacity:.5}
.smallbtn{background:#6f8f86;box-shadow:0 6px 0 #48675f,0 10px 22px #48675f55}
.smallbtn:hover{background:#63877d}
.status{
  text-align:center;font-size:20px;font-weight:850;
  color:#6d5d50;min-height:30px;margin-top:12px;
}
.winnerBox{
  width:min(1050px,94vw);margin:18px auto;padding:26px;
  border-radius:30px;background:#fffaf4cc;border:2px solid #ffffffcc;
  text-align:center;box-shadow:0 18px 45px #6c584830;
}
#winner{
  font-size:clamp(28px,5vw,60px);
  font-weight:950;color:#4b3f35;
}
.grid{
  width:min(1400px,96vw);margin:18px auto 45px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;
}
.card{
  min-height:96px;padding:13px;border-radius:20px;
  background:#fffaf4cc;border:1px solid #ffffffcc;
  box-shadow:0 8px 20px #6c58481f;
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-weight:780;line-height:1.17;color:#3e352f;
  transition:transform .08s, background .08s, box-shadow .08s, border .08s;
}
.card.active{
  transform:scale(1.06);
  background:#dfeee8;
  border:3px solid #6f8f86;
  box-shadow:0 0 0 5px #dfeee8aa,0 12px 32px #6f8f866;
}
.card.won{
  transform:scale(1.12);
  background:#f4d9c6;
  border:4px solid #b9785f;
  box-shadow:0 0 0 7px #f4d9c6aa,0 18px 46px #b9785f77;
}
.confetti{
  position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999;
}
.piece{position:absolute;top:-25px;animation:fall 1.4s linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
@media(max-width:650px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(125px,1fr))}
  .card{font-size:14px;min-height:86px}
}
</style>
</head>
<body>

<header>
  <h1>Elleville minipremier</h1>
  <div class="sub">Lyset flyr fra rute til rute, bremser og stopper tydelig.</div>
</header>

<div class="controls">
  <button id="drawBtn">Trekk premie</button>
  <button id="resetBtn" class="smallbtn">Nullstill</button>
</div>

<div class="status" id="status">Klar.</div>

<section class="winnerBox">
  <div id="winner">Ingen premie trukket ennå</div>
</section>

<main class="grid" id="grid"></main>
<div class="confetti" id="confetti"></div>

<script>
const prizes = [
"Floss i 10 sekunder.",

"Sitte som en frosk og si «kvakk».",
"Usynlig godteripose.",

"Fyr i rompa.",
"Svømmetur.",
"Mistet synet.",
"Fallskjermjeger.",
"Ris på rompa.",
"Hopp som en hare.",
"Snøfall og aking.",
"Jeg må på do-dans.",
"Popcorn.",
"Zombie.",
"Dab.",
"Gå som en seigmann.",
"Sov på pulten.",
"Krabb rundt.",

"Lag snøengel.",
"Hinke.",

"Gulvet er laget av lego.",
"Lek delfin.",
"Du scoret vinnermålet i VM-finalen.",
"Pingvin.",
"Applauder når en voksen kommer inn.",
"Dødsknappen.",
"Slalom i altfor bratt bakke.",
"Ballong.",
"Hyl uten lyd.",
"Chili i øyet.",
"Latteranfall.",
"Gulvet er lava.",
"Kongen befaler.",
"Balanser kost på nesen.",
"Snikende epleslang.",
"Dans i slow motion.",
"Stein saks papir.",
"Ninjagange.",
"Rygghopp.",

"Forsøk å kysse albuen.",
"Stå på ett bein og lag grimase.",
"Rapekonkurranse.",

"Kjempetunge tøfler.",

"Herm etter sidemann.",

"Klekk ut av dinosaur-egg.",
"Fotballskade.",
"Feire scoring.",
"Usynlig romba-stang.",
"Verdenskjent superstjerne.",
"Løp uten å gå framover.",
"Hopp på trampoline.",
"Syng en sang.",
"Prikkedøden.",
"Vær et egg som klekker.",
"VR-briller.",
"Det regner piler.",
"Kenguru med anfall.",
"Lenke med strøm.",
"Koala.",
"Hopp opp og ned.",
"Robot.",
"Gelé i beina.",
"Kryp som en slange.",
"Hoppe sa gåsa.",
"Armer og bein bundet fast.",
"Fisk på land.",
"Supermodell.",
"Tomt for dopapir.",
"Frosk som prøver å spise flue.",
"Katt.",
"Løp fra tiger med limte bein.",
"Frosk i buksa.",
"Ta storetåa på nesa.",
"Gå i sakte film.",
"Speil en partner.",
"Gulvet er lava i 30 sekunder.",
"Reis til månen på oppblåsbar pølse.",
"Gå baklengs.",
"Gå gjennom gjørme."
];

const grid = document.getElementById("grid");
const winner = document.getElementById("winner");
const drawBtn = document.getElementById("drawBtn");
const resetBtn = document.getElementById("resetBtn");
const statusText = document.getElementById("status");
const confetti = document.getElementById("confetti");

let cards = [];
let spinning = false;
let lastIndex = -1;

function buildGrid(){
  grid.innerHTML = "";
  prizes.forEach((text,i)=>{
    const card = document.createElement("div");
    card.className = "card";
    card.textContent = text;
    card.dataset.index = i;
    grid.appendChild(card);
  });
  cards = [...document.querySelectorAll(".card")];
}
buildGrid();

function clearLight(){
  cards.forEach(c=>c.classList.remove("active","won"));
}

function throwConfetti(){
  confetti.innerHTML = "";
  const emojis = ["✦","●","◆","✧","○","◇"];
  const colors = ["#8b6f5a","#6f8f86","#b9785f","#4b3f35"];
  for(let i=0;i<80;i++){
    const p = document.createElement("div");
    p.className = "piece";
    p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left = Math.random()*100 + "vw";
    p.style.fontSize = (16 + Math.random()*24) + "px";
    p.style.color = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = Math.random()*0.25 + "s";
    confetti.appendChild(p);
  }
  setTimeout(()=>confetti.innerHTML="",1700);
}

function drawPrize(){

  if(spinning) return;

  spinning = true;
  drawBtn.disabled = true;
  resetBtn.disabled = true;

  clearLight();

  winner.textContent = "Lyset går ...";
  statusText.textContent = "Trekker.";

  let target = Math.floor(Math.random()*cards.length);

  if(cards.length > 1){
    while(target === lastIndex){
      target = Math.floor(Math.random()*cards.length);
    }
  }

  let current = Math.floor(Math.random()*cards.length);

  let rounds = 1 + Math.floor(Math.random()*2);

  let totalSteps =
    rounds * cards.length +
    ((target - current + cards.length) % cards.length);

  let step = 0;

  function getSpeed(progress){
    if(progress < 0.55) return 14;
    if(progress < 0.75) return 32;
    if(progress < 0.9) return 70;
    return 135;
  }

  function tick(){

    clearLight();

    current = (current + 1) % cards.length;

    cards[current].classList.add("active");

    if(step >= totalSteps){

      clearLight();

      cards[target].classList.add("won");

      winner.textContent = prizes[target];

      statusText.textContent = "Premien er trukket.";

      cards[target].scrollIntoView({
        behavior:"smooth",
        block:"center"
      });

      lastIndex = target;

      throwConfetti();

      spinning = false;

      drawBtn.disabled = false;
      resetBtn.disabled = false;

      return;
    }

    if(step % 12 === 0){
      cards[current].scrollIntoView({
        behavior:"smooth",
        block:"center"
      });
    }

    step++;

    const progress = step / totalSteps;

    setTimeout(tick,getSpeed(progress));
  }

  tick();
}

function resetAll(){
  spinning = false;
  lastIndex = -1;
  clearLight();
  winner.textContent = "Ingen premie trukket ennå";
  statusText.textContent = "Klar.";
  drawBtn.disabled = false;
  resetBtn.disabled = false;
}

drawBtn.addEventListener("click",drawPrize);
resetBtn.addEventListener("click",resetAll);
</script>

</body>
</html>
